<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 PREMIUM IDOL GALLERY 🔥</title>
    <style>
        :root {
            --primary: #ff0055;
            --primary-dim: #b3003c;
            --bg-dark: #0e0e10;
            --bg-card: #1a1a1d;
            --bg-toolbar: #161618;
            --border: #2a2a2e;
            --text-muted: #9a9aa2;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
        }

        /* Thanh công cụ */
        .toolbar-wrap { background: var(--bg-toolbar); border-bottom: 1px solid var(--border); }
        .toolbar { max-width: 1200px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .toolbar-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; margin-right: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
        .tool-link {
            display: flex; align-items: center; gap: 7px;
            background: var(--bg-card); border: 1px solid var(--border);
            color: #ddd; text-decoration: none;
            padding: 7px 13px; border-radius: 20px;
            font-size: 13px; font-weight: 600; white-space: nowrap;
            transition: border-color .15s, color .15s, background .15s;
        }
        .tool-link:hover { border-color: var(--primary); color: #fff; background: #241218; }
        .tool-link .ic { font-size: 15px; line-height: 1; }

        @media (max-width: 600px) {
            .toolbar { gap: 8px; }
            .toolbar-label { width: 100%; margin-bottom: 2px; }
            .tool-link { font-size: 12px; padding: 6px 11px; }
        }

        header.site-header { padding: 26px 20px 18px; text-align: center; }
        header.site-header h1 { margin: 0; font-size: 26px; letter-spacing: 0.5px; }

        .gallery-grid { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .idol-card { background: var(--bg-card); border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); transition: border-color .15s, transform .15s; }
        .idol-card:hover { border-color: var(--primary-dim); transform: translateY(-2px); }
        .cover-wrapper { width: 100%; height: 320px; background: #000; }
        .cover-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .idol-info { padding: 12px; text-align: center; font-weight: bold; }

        /* Popup fix cứng không cuộn */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; z-index: 1000; }
        .popup-header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: relative; z-index: 2; background: #000; }
        
        /* Chế độ xem tất cả (Scroll mode) */
        .popup-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .popup-body img { max-width: 100%; border-radius: 8px; border: 2px solid var(--border); box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 8px 24px rgba(0,0,0,0.5); touch-action: pinch-zoom; }

        /* Chế độ xem tự động (Slideshow) */
        .popup-body.slideshow-mode { overflow: hidden; justify-content: center; touch-action: none; }
        .zoom-wrap { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; overflow: hidden; touch-action: none; align-items: center; justify-content: center; z-index: 1; }
        .zoom-wrap.active { display: flex; }
        .zoom-wrap img { max-height: 80vh; max-height: 80dvh; max-width: 100%; object-fit: contain; display: block; border-radius: 8px; border: 2px solid var(--primary-dim); box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 8px 30px rgba(0,0,0,0.6); transform-origin: center center; will-change: transform; }
        .zoom-hint { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.55); color: #ccc; font-size: 11px; padding: 3px 10px; border-radius: 10px; pointer-events: none; opacity: 1; transition: opacity .3s; }
        .zoom-hint.hidden { opacity: 0; }

        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-slideshow { background: #00b359; color: white; }

        /* Nút điều hướng trong slideshow */
        .slide-nav-btn { display: none; position: fixed; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; font-size: 28px; width: 48px; height: 64px; cursor: pointer; z-index: 1001; border-radius: 6px; }
        .slide-nav-btn.show { display: block; }
        #btnPrev { left: 15px; }
        #btnNext { right: 15px; }
        .slide-counter { display: none; position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 12px; font-size: 13px; z-index: 2; }
        .slide-counter.show { display: block; }
    </style>
</head>
<body>

<div class="toolbar-wrap">
    <div class="toolbar">
        <span class="toolbar-label">Công cụ:</span>
        <a class="tool-link" href="https://harmonious-piroshki-6af81e.netlify.app/" target="_blank" rel="noopener"><span class="ic">⚙️</span>Quản lý WordPress</a>
        <a class="tool-link" href="https://phenomenal-squirrel-74387a.netlify.app/" target="_blank" rel="noopener"><span class="ic">📄</span>Đọc file TXT</a>
        <a class="tool-link" href="https://papaya-sprite-85ad1c.netlify.app/" target="_blank" rel="noopener"><span class="ic">🎬</span>Dịch phim</a>
        <a class="tool-link" href="https://vin-html.netlify.app/" target="_blank" rel="noopener"><span class="ic">💻</span>Sửa HTML</a>
        <a class="tool-link" href="https://sub-edit.netlify.app/" target="_blank" rel="noopener"><span class="ic">🎞️</span>Đổi file SRT</a>
        <a class="tool-link" href="https://jpgload.netlify.app/" target="_blank" rel="noopener"><span class="ic">🖼️</span>Đổi đuôi JPG</a>
        <a class="tool-link" href="https://imgload.netlify.app/" target="_blank" rel="noopener"><span class="ic">✂️</span>Nén &amp; cắt ảnh</a>
    </div>
</div>

<header class="site-header"><h1>🔥 PREMIUM IDOL GALLERY 🔥</h1></header>
<div class="gallery-grid" id="galleryGrid"></div>

<div class="popup-overlay" id="popupOverlay">
    <div class="popup-header">
        <span id="popupTitle" style="color:var(--primary); font-weight:bold;"></span>
        <div>
            <button class="btn btn-slideshow" onclick="toggleSlideshow()" id="btnPlay">▶ XEM TỰ ĐỘNG</button>
            <button class="btn" onclick="closePopup()" style="background:#444; color:white;">&times;</button>
        </div>
    </div>
    <div class="popup-body" id="popupBody"></div>
    <div class="zoom-wrap" id="zoomWrap">
        <img id="zoomImg" src="" alt="">
        <span class="zoom-hint" id="zoomHint">Chụm 2 ngón để phóng to</span>
    </div>
    <button class="slide-nav-btn" id="btnPrev" onclick="prevSlide()">&#10094;</button>
    <button class="slide-nav-btn" id="btnNext" onclick="nextSlide()">&#10095;</button>
    <div class="slide-counter" id="slideCounter"></div>
</div>

<script>
    let currentImages = [];
    let slideIndex = 0;
    let isSlideshowActive = false;
    let slideshowInterval = null;
    const GIST_URL = 'https://gist.githubusercontent.com/phimtag/185a9fd80ff87e2303a4c77ffbd4baa2/raw/gistfile1.txt';

    fetch(GIST_URL + '?t=' + new Date().getTime())
        .then(r => r.json())
        .then(data => {
            const grid = document.getElementById('galleryGrid');
            data.forEach(idol => {
                const div = document.createElement('div');
                div.className = 'idol-card';
                div.onclick = () => openAlbum(idol.name, idol.images);
                div.innerHTML = `<div class="cover-wrapper"><img src="${idol.images[0]}"></div><div class="idol-info">${idol.name}</div>`;
                grid.appendChild(div);
            });
        });

    function openAlbum(name, images) {
        currentImages = images;
        document.getElementById('popupTitle').innerText = name;
        document.getElementById('popupBody').className = "popup-body";
        document.getElementById('popupBody').innerHTML = images.map(url => `<img src="${url}">`).join('');
        document.getElementById('popupOverlay').style.display = 'flex';
    }

    function toggleSlideshow() {
        isSlideshowActive = !isSlideshowActive;
        const body = document.getElementById('popupBody');
        const btn = document.getElementById('btnPlay');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const counter = document.getElementById('slideCounter');
        const zoomWrap = document.getElementById('zoomWrap');

        if (isSlideshowActive) {
            body.className = "popup-body slideshow-mode";
            body.innerHTML = "";
            btn.innerText = "⏸ DỪNG XEM";
            btnPrev.classList.add('show');
            btnNext.classList.add('show');
            counter.classList.add('show');
            zoomWrap.classList.add('active');
            slideIndex = 0;
            renderSlide();
            startTimer();
        } else {
            stopTimer();
            zoomWrap.classList.remove('active');
            body.className = "popup-body";
            body.innerHTML = currentImages.map(url => `<img src="${url}">`).join('');
            btn.innerText = "▶ XEM TỰ ĐỘNG";
            btnPrev.classList.remove('show');
            btnNext.classList.remove('show');
            counter.classList.remove('show');
        }
    }

    function startTimer() {
        clearInterval(slideshowInterval);
        slideshowInterval = setInterval(() => {
            slideIndex = (slideIndex + 1) % currentImages.length;
            renderSlide();
        }, 40000);
    }

    function stopTimer() {
        clearInterval(slideshowInterval);
    }

    function nextSlide() {
        slideIndex = (slideIndex + 1) % currentImages.length;
        renderSlide();
        if (isSlideshowActive) startTimer(); // reset đếm giờ khi bấm thủ công
    }

    function prevSlide() {
        slideIndex = (slideIndex - 1 + currentImages.length) % currentImages.length;
        renderSlide();
        if (isSlideshowActive) startTimer();
    }

    function renderSlide() {
        const img = document.getElementById('zoomImg');
        img.src = currentImages[slideIndex];
        resetZoom();
        document.getElementById('slideCounter').innerText = `${slideIndex + 1} / ${currentImages.length}`;
    }

    function closePopup() {
        stopTimer();
        isSlideshowActive = false;
        document.getElementById('btnPlay').innerText = "▶ XEM TỰ ĐỘNG";
        document.getElementById('btnPrev').classList.remove('show');
        document.getElementById('btnNext').classList.remove('show');
        document.getElementById('slideCounter').classList.remove('show');
        document.getElementById('zoomWrap').classList.remove('active');
        document.getElementById('popupOverlay').style.display = 'none';
    }

    /* ===== Zoom & kéo ảnh trong chế độ xem tự động ===== */
    const zoomImg = document.getElementById('zoomImg');
    const zoomWrap = document.getElementById('zoomWrap');
    let zoomScale = 1, panX = 0, panY = 0;
    let zoomHintShown = false;

    function applyZoom() {
        zoomImg.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomScale})`;
    }

    function resetZoom() {
        zoomScale = 1; panX = 0; panY = 0;
        applyZoom();
    }

    function hideZoomHintOnce() {
        if (!zoomHintShown) {
            zoomHintShown = true;
            document.getElementById('zoomHint').classList.add('hidden');
        }
    }

    function clampPan() {
        // Giới hạn kéo để ảnh không trôi quá xa khỏi khung nhìn
        const maxPan = 250 * zoomScale;
        panX = Math.max(-maxPan, Math.min(maxPan, panX));
        panY = Math.max(-maxPan, Math.min(maxPan, panY));
    }

    // --- Pinch (2 ngón) + kéo (1 ngón khi đã zoom) trên di động ---
    let touchStartDist = 0, touchStartScale = 1;
    let lastTouchX = 0, lastTouchY = 0, isPanningTouch = false;
    let lastTapTime = 0;

    function getDist(t1, t2) {
        return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
    }

    zoomWrap.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            touchStartDist = getDist(e.touches[0], e.touches[1]);
            touchStartScale = zoomScale;
            isPanningTouch = false;
        } else if (e.touches.length === 1) {
            const now = Date.now();
            if (now - lastTapTime < 300) {
                // Double-tap: zoom vào hoặc reset
                zoomScale = zoomScale > 1 ? 1 : 2.5;
                panX = 0; panY = 0;
                applyZoom();
                hideZoomHintOnce();
            }
            lastTapTime = now;
            if (zoomScale > 1) {
                isPanningTouch = true;
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            }
        }
    }, { passive: true });

    zoomWrap.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const newDist = getDist(e.touches[0], e.touches[1]);
            zoomScale = Math.max(1, Math.min(4, touchStartScale * (newDist / touchStartDist)));
            hideZoomHintOnce();
            clampPan();
            applyZoom();
        } else if (e.touches.length === 1 && isPanningTouch && zoomScale > 1) {
            e.preventDefault();
            const dx = e.touches[0].clientX - lastTouchX;
            const dy = e.touches[0].clientY - lastTouchY;
            panX += dx; panY += dy;
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
            clampPan();
            applyZoom();
        }
    }, { passive: false });

    zoomWrap.addEventListener('touchend', (e) => {
        isPanningTouch = false;
        if (zoomScale <= 1) resetZoom();
    });

    // --- Lăn chuột để zoom + double-click + kéo bằng chuột trên máy tính ---
    zoomWrap.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY < 0 ? 0.15 : -0.15;
        zoomScale = Math.max(1, Math.min(4, zoomScale + delta));
        hideZoomHintOnce();
        clampPan();
        applyZoom();
        if (zoomScale <= 1) resetZoom();
    }, { passive: false });

    zoomWrap.addEventListener('dblclick', () => {
        zoomScale = zoomScale > 1 ? 1 : 2.5;
        panX = 0; panY = 0;
        applyZoom();
        hideZoomHintOnce();
    });

    let isDraggingMouse = false, lastMouseX = 0, lastMouseY = 0;
    zoomWrap.addEventListener('mousedown', (e) => {
        if (zoomScale > 1) {
            isDraggingMouse = true;
            lastMouseX = e.clientX; lastMouseY = e.clientY;
        }
    });
    window.addEventListener('mousemove', (e) => {
        if (isDraggingMouse) {
            panX += e.clientX - lastMouseX;
            panY += e.clientY - lastMouseY;
            lastMouseX = e.clientX; lastMouseY = e.clientY;
            clampPan();
            applyZoom();
        }
    });
    window.addEventListener('mouseup', () => { isDraggingMouse = false; });
</script>
</body>
</html>
